<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 120" width="100%" height="100%">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#9C4446" />
      <stop offset="100%" stop-color="#C82828" />
    </linearGradient>

    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2D3B8E" />
      <stop offset="100%" stop-color="#4B9FE3" />
    </linearGradient>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Russo+One&amp;display=swap');
      
      .logo-text {
        font-family: 'Russo One', sans-serif;
        font-size: 64px;
        fill: url(#redGrad); /* Main text uses red gradient */
      }
      
      .accent-text {
        fill: url(#blueGrad); /* LAB text uses blue gradient */
      }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <text x="20" y="80" class="logo-text">
    JK METAL <tspan class="accent-text">LAB</tspan>
  </text>

  <polygon points="20,95 430,95 420,105 20,105" fill="url(#redGrad)"/>
  <polygon points="435,95 530,95 520,105 425,105" fill="url(#blueGrad)"/>
</svg>
